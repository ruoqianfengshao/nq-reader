name: Release userscript

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:userscript
      - name: Set userscript version from tag
        run: sed -i "s|// @version      0.0.0|// @version      ${GITHUB_REF_NAME#v}|" dist/userscripts/nq-reader.user.js
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/userscripts/nq-reader.user.js
